<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <section class="landing" aria-label="Landing">
    <div class="portal-layer"></div>
    <img src="Info_bar.png" alt="Info bar" class="info-bar-image">
    <header>
      <img src="about_me.png" alt="About Me" class="about-me-image">
    </header>
    <h1 class="pigeon-name"><img src="better_pigeon.png" alt="pigeon_" class="pigeon-image"></h1>
  </section>

  <section class="frame1" aria-label="Frame 1 slide">
    <img src="01.png" alt="01" class="frame-overlay overlay-1" aria-hidden="true">
    <img src="02.png" alt="02" class="frame-overlay overlay-2" aria-hidden="true">
    <img src="03.png" alt="03" class="frame-overlay overlay-3" aria-hidden="true">
    <img src="04.png" alt="04" class="frame-overlay overlay-4" aria-hidden="true">
  </section>

  <script src="script.js"></script>
</body>
</html>
