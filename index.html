<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Personal Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <section class="landing" aria-label="Landing">
      <div class="portal-layer" aria-hidden="true"></div>
      <img src="Info_bar.png" alt="Info bar" class="info-bar-image">
      <header>
        <img src="about_me.png" alt="About Me" class="about-me-image">
      </header>
      <h1 class="pigeon-name">
        <img src="better_pigeon.png" alt="pigeon_" class="pigeon-image">
      </h1>
    </section>

    <section class="frame1" aria-label="Frame 1 slide">
      <img src="text1.png" alt="Text overlay" class="text1-image" aria-hidden="true">
      <div class="frame-images" aria-hidden="true">
        <img src="01.png" alt="" class="frame-extra left one" data-target-image="layout1.png">
        <img src="02.png" alt="" class="frame-extra two">
        <img src="03.png" alt="" class="frame-extra left down three">
        <img src="04.png" alt="" class="frame-extra four">
      </div>
    </section>

    <section class="extra-space" aria-label="Extended scroll space"></section>

    <section class="bottom-gallery" aria-label="Bottom gallery">
      <img src="layout1.png" alt="Layout 1" class="bottom-image layout-image is-active" data-image="layout1.png">
      <img src="MUSICBOX1.png" alt="Music box 1" class="bottom-image musicbox-image is-hidden" data-image="MUSICBOX1.png">
      <img src="MUSIC1.png" alt="Music 1" class="bottom-image music-image is-hidden" data-image="MUSIC1.png">
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
